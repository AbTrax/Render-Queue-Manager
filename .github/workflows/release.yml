name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version (X.Y.Z) — leave blank to read from __init__.py"
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: vars
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            ver="${GITHUB_REF##*/v}"
          elif [[ -n "${{ inputs.version }}" ]]; then
            ver="${{ inputs.version }}"
          else
            ver=$(python3 -c "
          import re, pathlib
          text = pathlib.Path('__init__.py').read_text()
          m = re.search(r\"__version__\s*=\s*['\\\"]([^'\\\"]+)['\\\"]\", text)
          print(m.group(1))
          ")
          fi
          echo "version=$ver"  >> "$GITHUB_OUTPUT"
          echo "tag=v$ver"     >> "$GITHUB_OUTPUT"
          echo "zip=render-queue-manager-x-v${ver}.zip" >> "$GITHUB_OUTPUT"

      - name: Ensure tag exists (manual dispatch)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: |
          git config user.name  "github-actions"
          git config user.email "actions@users.noreply.github.com"
          git tag -a "${{ steps.vars.outputs.tag }}" -m "Release ${{ steps.vars.outputs.version }}" 2>/dev/null || true
          git push origin "${{ steps.vars.outputs.tag }}" 2>/dev/null || true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Package extension
        run: |
          python scripts/package_extension.py --version "${{ steps.vars.outputs.version }}"
          ls -lh "${{ steps.vars.outputs.zip }}"

      - name: Extract changelog for this version
        id: notes
        run: |
          TAG="${{ steps.vars.outputs.tag }}"
          PREV=$(git tag --sort=-v:refname | grep -v "^${TAG}$" | head -n1 || true)
          {
            echo "## What's Changed"
            echo ""
            if [[ -n "$PREV" ]]; then
              git log --oneline "${PREV}..${TAG}" -- | sed 's/^/- /'
            else
              echo "Initial release"
            fi
          } > notes.md
          cat notes.md

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-zip
          path: ${{ steps.vars.outputs.zip }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Render Queue Manager X ${{ steps.vars.outputs.version }}
          tag_name: ${{ steps.vars.outputs.tag }}
          body_path: notes.md
          files: ${{ steps.vars.outputs.zip }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
